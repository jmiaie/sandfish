services:
  sandfish:
    build:
      context: .
      dockerfile: Dockerfile
    image: sandfish:latest
    container_name: sandfish
    ports:
      - "8000:8000"
    volumes:
      - ./vault:/app/vault
      - ./logs:/app/logs
    environment:
      OMPA_VAULT_PATH: /app/vault
      SANDFISH_ENV: production
      # Set SANDFISH_API_KEY in your shell or .env file before running:
      #   SANDFISH_API_KEY=$(openssl rand -hex 32) docker compose up
      SANDFISH_API_KEY: ${SANDFISH_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Run a long-form simulation alongside the API server.
  # Enable with:  docker compose --profile orchestrator up
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: sandfish:latest
    container_name: sandfish-orchestrator
    command: ["sandfish", "orchestrator", "--vault", "/app/vault", "--rounds", "1000"]
    volumes:
      - ./vault:/app/vault
      - ./logs:/app/logs
    environment:
      OMPA_VAULT_PATH: /app/vault
    profiles:
      - orchestrator
    restart: "no"

volumes:
  vault:
    driver: local
  logs:
    driver: local
